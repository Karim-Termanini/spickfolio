name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Unit tests
        run: python -m unittest test_server_security.py test_hf_cache.py test_download_jobs.py test_desktop_actions.py -v

      - name: Locale parity
        run: python check_locales.py

      - name: Server import smoke
        run: python -c "from stats_sheets.main import run; from stats_sheets.handler import Handler"
