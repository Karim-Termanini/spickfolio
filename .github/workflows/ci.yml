name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Unit and integration tests
        run: ./run-tests.sh

  linux-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y wget dpkg-dev libfuse2

      - name: Build Linux installers
        run: chmod +x installer/build-linux-installer.sh && ./installer/build-linux-installer.sh

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: spickFolio-linux
          path: |
            dist/spickFolio
            dist/spickFolio-*-x86_64.AppImage
            dist/spickfolio_*_amd64.deb
          if-no-files-found: error

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: ./installer/build-windows-installer.ps1

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: spickFolio-windows
          path: |
            dist/spickFolio.exe
            dist/spickFolio-Setup-*.exe
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright E2E (networked download)
        run: RUN_NETWORK_E2E=1 ./run-e2e.sh
