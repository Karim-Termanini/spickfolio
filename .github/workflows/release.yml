name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y wget dpkg-dev libfuse2

      - name: Build Linux installers
        run: chmod +x installer/build-linux-installer.sh && ./installer/build-linux-installer.sh

      - uses: actions/upload-artifact@v4
        with:
          name: spickFolio-linux
          path: |
            dist/spickFolio-*-x86_64.AppImage
            dist/spickfolio_*_amd64.deb
          if-no-files-found: error

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: ./installer/build-windows-installer.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: spickFolio-windows
          path: |
            dist/spickFolio.exe
            dist/spickFolio-Setup-*.exe
          if-no-files-found: error

  publish:
    needs: [linux-installer, windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/spickFolio-linux/*
            artifacts/spickFolio-windows/*
